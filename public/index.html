<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Baby Got Backgammon</title>
<style>
  :root {
    --wall: #178a9d;
    --wall-deep: #0e6b7c;
    --accent: #9e2430;
    --accent-deep: #7a1a24;
    --gold: #d9a441;
    --gold-bright: #f0c060;
    --cream: #f3e9d2;
    --wood: #4a2c2a;
    --ink: #23222b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(circle at 30% 10%, var(--wall) 0%, var(--wall-deep) 80%);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--cream);
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; max-width: 900px;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px 4px;
  }
  #badge {
    width: 62px; height: 62px; border-radius: 50%;
    border: 3px solid var(--gold); object-fit: cover;
    background: var(--wall-deep); flex: none;
  }
  h1 {
    font-size: clamp(17px, 4.5vw, 26px); margin: 0; line-height: 1.1;
    color: var(--gold-bright); letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--accent-deep);
    font-weight: 900;
  }
  h1 small { display:block; font-size: 11px; color: var(--cream); letter-spacing: 2px; font-weight: normal; }
  #newgame {
    margin-left: auto; background: none; border: 1px solid rgba(243,233,210,.4);
    color: rgba(243,233,210,.7); border-radius: 8px; padding: 6px 10px; font-size: 11px;
  }
  #banner {
    width: 100%; max-width: 900px; text-align: center;
    padding: 7px 12px; font-size: clamp(14px, 3.8vw, 18px);
    font-style: italic;
  }
  #banner.mine { color: var(--gold-bright); font-weight: bold; font-style: normal; }
  #board-wrap { width: 100%; max-width: 900px; padding: 0 6px; }
  svg { width: 100%; height: auto; display: block; border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,.45); }
  #controls {
    display: flex; gap: 10px; padding: 12px; width: 100%; max-width: 900px;
    justify-content: center;
  }
  #controls button {
    font-family: inherit; font-weight: bold; font-size: 16px;
    padding: 13px 22px; border-radius: 12px; border: 2px solid var(--gold);
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color: var(--cream); min-width: 96px;
    box-shadow: 0 4px 10px rgba(0,0,0,.35);
  }
  #controls button:disabled { opacity: .25; border-color: rgba(217,164,65,.3); }
  #controls button:active:not(:disabled) { transform: translateY(2px); }
  #toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--cream); padding: 10px 18px;
    border-radius: 10px; border: 1px solid var(--gold); font-size: 14px;
    opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 86vw;
    text-align: center; z-index: 10;
  }
  #toast.show { opacity: 1; }
  #dicebox { display: flex; gap: 8px; align-items: center; }
  .die {
    width: 40px; height: 40px; border-radius: 9px; background: var(--cream);
    display: grid; place-items: center; font-size: 26px; color: var(--ink);
    border: 2px solid var(--gold); font-family: system-ui;
  }
  .die.used { opacity: .3; }
  footer { font-size: 10px; color: rgba(243,233,210,.5); padding: 6px 0 14px; text-align:center; }
</style>
</head>
<body>
<header>
  <img id="badge" src="badge.png" onerror="this.style.display='none'">
  <h1><span id="title">BABY GOT BACKGAMMON</span><small id="subtitle"></small></h1>
  <button id="newgame">new game</button>
</header>
<div id="banner">connecting…</div>
<div id="board-wrap">
  <svg id="board" viewBox="0 0 1500 1060" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div id="controls">
  <div id="dicebox"></div>
  <button id="roll">ROLL 🎲</button>
  <button id="undo">UNDO</button>
  <button id="endturn">END TURN</button>
</div>
<div id="toast"></div>
<footer id="footer">engine adapted from sam-mfb/backgammon-mcp (MIT)</footer>

<script>
const SVG = 'http://www.w3.org/2000/svg';
const board = document.getElementById('board');
const banner = document.getElementById('banner');
const toastEl = document.getElementById('toast');
const diceBox = document.getElementById('dicebox');
const btnRoll = document.getElementById('roll');
const btnUndo = document.getElementById('undo');
const btnEnd = document.getElementById('endturn');
const DIE_CHAR = { 1:'⚀',2:'⚁',3:'⚂',4:'⚃',5:'⚄',6:'⚅' };

let S = null;          // latest state snapshot
let selected = null;   // selected origin: point index or 'bar'
let CFG = null;        // config.json (names, theme, flavor)

async function loadConfig() {
  CFG = await api('config');
  if (!CFG) return;
  const t = CFG.theme || {};
  const root = document.documentElement.style;
  if (t.wall) root.setProperty('--wall', t.wall);
  if (t.wallDeep) root.setProperty('--wall-deep', t.wallDeep);
  if (t.accent) root.setProperty('--accent', t.accent);
  if (t.accentDeep) root.setProperty('--accent-deep', t.accentDeep);
  if (t.gold) root.setProperty('--gold', t.gold);
  if (t.goldBright) root.setProperty('--gold-bright', t.goldBright);
  if (t.cream) root.setProperty('--cream', t.cream);
  if (CFG.title) { document.title = CFG.title; document.getElementById('title').textContent = CFG.title; }
  document.getElementById('subtitle').textContent = CFG.subtitle || '';
  if (CFG.badgeImage) document.getElementById('badge').src = CFG.badgeImage;
  if (CFG.flavor && CFG.flavor.footer) document.getElementById('footer').textContent = CFG.flavor.footer;
}

// --- geometry -------------------------------------------------------------
// top row L->R: 13..18 | bar | 19..24   bottom row L->R: 12..7 | bar | 6..1
const COL_X = {};
{
  const leftX = i => 60 + i * 100, rightX = i => 760 + i * 100;
  [13,14,15,16,17,18].forEach((p,i) => COL_X[p] = leftX(i));
  [19,20,21,22,23,24].forEach((p,i) => COL_X[p] = rightX(i));
  [12,11,10,9,8,7].forEach((p,i) => COL_X[p] = leftX(i));
  [6,5,4,3,2,1].forEach((p,i) => COL_X[p] = rightX(i));
}
const isTop = p => p >= 13;
const PT_W = 100, PT_H = 390, TOP_Y = 60, BOT_Y = 1000, R = 38;

function el(name, attrs, parent) {
  const e = document.createElementNS(SVG, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  (parent || board).appendChild(e);
  return e;
}

function checkerStackPos(p, n) {
  const cx = COL_X[p] + PT_W/2;
  return isTop(p)
    ? { cx, cy: TOP_Y + R + 4 + Math.min(n,4) * (R*1.9) }
    : { cx, cy: BOT_Y - R - 4 - Math.min(n,4) * (R*1.9) };
}

// --- rendering ------------------------------------------------------------
function render() {
  board.innerHTML = '';
  const defs = el('defs', {});
  const wc = (CFG && CFG.theme && CFG.theme.whiteChecker) || ['#e46060','#b02a35','#7a1a24'];
  const bc = (CFG && CFG.theme && CFG.theme.blackChecker) || ['#5a5a6e','#2b2b38','#17171f'];
  defs.innerHTML = `
    <radialGradient id="gWhite" cx="35%" cy="30%"><stop offset="0%" stop-color="${wc[0]}"/><stop offset="70%" stop-color="${wc[1]}"/><stop offset="100%" stop-color="${wc[2]}"/></radialGradient>
    <radialGradient id="gBlack" cx="35%" cy="30%"><stop offset="0%" stop-color="${bc[0]}"/><stop offset="70%" stop-color="${bc[1]}"/><stop offset="100%" stop-color="${bc[2]}"/></radialGradient>
    <linearGradient id="gWood" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a3835"/><stop offset="100%" stop-color="#3a201e"/></linearGradient>
    <linearGradient id="gFelt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1d9aab"/><stop offset="100%" stop-color="#12707e"/></linearGradient>`;

  // frame + felt
  el('rect', { x:0, y:0, width:1500, height:1060, rx:18, fill:'url(#gWood)' });
  el('rect', { x:40, y:40, width:1420, height:980, rx:8, fill:'url(#gFelt)' });
  // bar
  el('rect', { x:660, y:40, width:80, height:980, fill:'url(#gWood)' });
  // bear-off trays (right edge)
  el('rect', { x:1370, y:60, width:80, height:390, rx:8, fill:'#3a201e', stroke:'#d9a441', 'stroke-width':2, opacity:.9, id:'tray-black' });
  el('rect', { x:1370, y:610, width:80, height:390, rx:8, fill:'#3a201e', stroke:'#d9a441', 'stroke-width':2, opacity:.9, id:'tray-white' });

  // points
  for (let p = 1; p <= 24; p++) {
    const x = COL_X[p], topSide = isTop(p);
    const y0 = topSide ? TOP_Y : BOT_Y, y1 = topSide ? TOP_Y + PT_H : BOT_Y - PT_H;
    const fill = (p % 2 === (topSide ? 1 : 0)) ? '#9e2430' : '#f3e9d2';
    el('polygon', {
      points: `${x+4},${y0} ${x+PT_W-4},${y0} ${x+PT_W/2},${y1}`,
      fill, opacity:.92, 'data-point': p
    });
  }

  if (!S) return;

  const mine = S.you === S.currentPlayer && !S.result;
  const legalFroms = new Set((mine && S.phase === 'moving') ? S.validMoves.map(m => m.from) : []);
  const dests = new Set();
  if (selected !== null) {
    const entry = S.validMoves.find(m => m.from === selected);
    if (entry) entry.destinations.forEach(d => dests.add(d.to));
  }

  // destination glow on points
  for (const d of dests) {
    if (d === 'off') {
      const tray = document.getElementById(S.you === 'white' ? 'tray-white' : 'tray-black');
      tray.setAttribute('stroke', '#f0c060'); tray.setAttribute('stroke-width', 6);
      tray.style.cursor = 'pointer';
      tray.addEventListener('click', () => tryMove(selected, 'off'));
    } else {
      const x = COL_X[d], topSide = isTop(d);
      el('circle', {
        cx: x + PT_W/2, cy: topSide ? TOP_Y + PT_H - 30 : BOT_Y - PT_H + 30, r: 26,
        fill: 'none', stroke: '#f0c060', 'stroke-width': 5, 'stroke-dasharray': '8 6',
        'data-dest': d, style: 'cursor:pointer'
      });
    }
  }

  // checkers on points
  for (let p = 1; p <= 24; p++) {
    const v = S.points[p-1];
    if (!v) continue;
    const owner = v > 0 ? 'white' : 'black';
    const n = Math.abs(v);
    for (let i = 0; i < Math.min(n, 5); i++) {
      const { cx, cy } = checkerStackPos(p, i);
      const c = el('circle', {
        cx, cy, r: R,
        fill: owner === 'white' ? 'url(#gWhite)' : 'url(#gBlack)',
        stroke: legalFroms.has(p) && owner === S.you ? '#f0c060' : '#d9a441',
        'stroke-width': legalFroms.has(p) && owner === S.you ? 6 : 2.5,
        'data-from': p
      });
      if (selected === p && i === Math.min(n,5)-1) c.setAttribute('stroke-dasharray','10 6');
    }
    if (n > 5) {
      const { cx, cy } = checkerStackPos(p, 4);
      el('text', { x: cx, y: cy + 8, 'text-anchor':'middle', 'font-size': 30,
        'font-weight':'bold', fill:'#f0c060', 'data-from': p }).textContent = n;
    }
  }

  // bar checkers
  ['white','black'].forEach(owner => {
    const n = S.bar[owner];
    if (!n) return;
    for (let i = 0; i < Math.min(n,3); i++) {
      const cy = owner === 'black' ? 190 + i*(R*1.9) : 870 - i*(R*1.9);
      el('circle', {
        cx: 700, cy, r: R,
        fill: owner === 'white' ? 'url(#gWhite)' : 'url(#gBlack)',
        stroke: legalFroms.has('bar') && owner === S.you ? '#f0c060' : '#d9a441',
        'stroke-width': legalFroms.has('bar') && owner === S.you ? 6 : 2.5,
        'data-from': 'bar'
      });
    }
  });

  // borne-off counts
  const off = S.borneOff;
  el('text', { x:1410, y:265, 'text-anchor':'middle', 'font-size':40, 'font-weight':'bold', fill:'#f0c060' })
    .textContent = off.black || '';
  el('text', { x:1410, y:815, 'text-anchor':'middle', 'font-size':40, 'font-weight':'bold', fill:'#f0c060' })
    .textContent = off.white || '';
  // tray labels
  el('text', { x:1410, y:90, 'text-anchor':'middle', 'font-size':22, fill:'#d9a441' }).textContent = (CFG && CFG.theme && CFG.theme.trayLabelBlack) || '●';
  el('text', { x:1410, y:995, 'text-anchor':'middle', 'font-size':22, fill:'#d9a441' }).textContent = (CFG && CFG.theme && CFG.theme.trayLabelWhite) || '○';

  renderChrome(mine);
}

function renderChrome(mine) {
  // banner
  banner.className = mine ? 'mine' : '';
  if (S.result) {
    const wname = S.players[S.result.winner];
    banner.textContent = `🏆 ${wname} wins${S.result.victoryType !== 'single' ? ' — a ' + S.result.victoryType + '!' : '!'} Tap "new game" for a rematch.`;
  } else if (!S.currentPlayer) {
    banner.textContent = 'No game yet — tap "new game" to break in the felt.';
  } else if (mine) {
    banner.textContent = S.phase === 'rolling'
      ? `Your turn, ${S.players[S.you]} — roll! 🎲`
      : `Your move, ${S.players[S.you]} — tap a glowing checker.`;
  } else {
    const tpl = (CFG && CFG.flavor && CFG.flavor.waiting) || '{name} is plotting their next move…';
    banner.textContent = tpl.replace('{name}', S.currentPlayerName);
  }
  // dice
  diceBox.innerHTML = '';
  if (S.diceRoll && S.phase === 'moving') {
    const remaining = [...S.remainingMoves];
    const shown = S.diceRoll.die1 === S.diceRoll.die2 ? [S.diceRoll.die1,S.diceRoll.die1,S.diceRoll.die1,S.diceRoll.die1] : [S.diceRoll.die1, S.diceRoll.die2];
    for (const d of shown) {
      const idx = remaining.indexOf(d);
      const usable = idx !== -1;
      if (usable) remaining.splice(idx, 1);
      const div = document.createElement('div');
      div.className = 'die' + (usable ? '' : ' used');
      div.textContent = DIE_CHAR[d];
      diceBox.appendChild(div);
    }
  }
  // buttons
  btnRoll.disabled = !(mine && S.phase === 'rolling');
  btnUndo.disabled = !(mine && S.phase === 'moving' && S.movesThisTurn.length > 0);
  btnEnd.disabled = !(mine && S.phase === 'moving' && S.validMoves.length === 0);
}

// --- interactions ----------------------------------------------------------
board.addEventListener('click', ev => {
  const t = ev.target;
  const attr = n => (t.getAttribute && t.getAttribute(n));
  // any tap resolves to a board location: dest marker, checker, or point triangle
  const raw = attr('data-dest') ?? attr('data-from') ?? attr('data-point');
  const mine = S && S.you === S.currentPlayer && S.phase === 'moving' && !S.result;
  if (raw === null || raw === undefined || !mine) {
    if (selected !== null) { selected = null; render(); }
    return;
  }
  const id = (raw === 'bar' || raw === 'off') ? raw : +raw;
  // destination first: selected piece + tap anywhere on a legal target point = move
  if (selected !== null) {
    const entry = S.validMoves.find(m => m.from === selected);
    if (entry && entry.destinations.some(d => d.to === id)) {
      tryMove(selected, id);
      return;
    }
  }
  // otherwise select/deselect a legal origin
  if (S.validMoves.some(m => m.from === id)) {
    selected = (selected === id) ? null : id;
  } else {
    selected = null;
  }
  render();
});

async function api(path, body) {
  try {
    const res = await fetch('api/' + path, {
      method: body === undefined ? 'GET' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body === undefined ? undefined : JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'hmm, that didn\'t work'); return null; }
    return data;
  } catch (e) { toast('connection hiccup — retrying'); return null; }
}

async function tryMove(from, to) {
  const d = await api('move', { from, to });
  if (d) { selected = null; apply(d); }
}
btnRoll.onclick = async () => {
  const d = await api('roll', {});
  if (d) { if (d.turnForfeited) toast('No legal moves — turn passes 😬'); apply(d); }
};
btnUndo.onclick = async () => { const d = await api('undo', {}); if (d) apply(d); };
btnEnd.onclick = async () => { const d = await api('endturn', {}); if (d) apply(d); };
document.getElementById('newgame').onclick = async () => {
  if (!confirm('Start a fresh game? Current board will be cleared.')) return;
  const d = await api('new', {});
  if (d) apply(d);
};

function apply(data) {
  const you = S ? S.you : (data.you || null);
  S = data;
  if (you && !S.you) S.you = you;
  render();
}

let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// --- live sync --------------------------------------------------------------
let es;
function connectSSE() {
  if (es) es.close();
  es = new EventSource('api/events');
  es.onmessage = ev => {
    const data = JSON.parse(ev.data);
    const you = S && S.you;
    S = data; S.you = you || S.you;
    if (!S.you) hydrate(); else { selected = null; render(); }
  };
  es.onerror = () => setTimeout(connectSSE, 4000);
}
async function hydrate() {
  const d = await api('state');
  if (d) { S = d; selected = null; render(); }
}
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) { hydrate(); connectSSE(); }
});
loadConfig().then(hydrate).then(connectSSE);
</script>
</body>
</html>
